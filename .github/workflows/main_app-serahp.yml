# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - app-serahp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      # 1. GitHub 저장소의 코드를 체크아웃합니다.
      - uses: actions/checkout@v4

      # 2. .NET 환경을 세팅합니다.
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # 3. code 폴더를 지정하여 의존성 패키지를 복구하고 빌드합니다. (MSB1003 에러 해결)
      - name: Build with dotnet
        run: dotnet build --configuration Release ./code

      # 4. code 폴더의 프로젝트를 빌드하여 최상위의 publish-output 폴더로 결과물을 추출합니다.
      - name: dotnet publish
        run: dotnet publish ./code -c Release -o ./publish-output

      # 5. 다음 배포(deploy) 작업에서 사용할 수 있도록 빌드된 결과물을 업로드합니다.
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: net-app
          path: ./publish-output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      # 1. 빌드 작업에서 업로드한 결과물을 배포 가상환경으로 다운로드합니다.
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: net-app
          path: ./deployment-package # 다운로드 받을 폴더 지정

      # 2. Azure에 인증 로그인을 진행합니다.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_627D738CFE8B4BE38627E369128FA14E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_154D2003C69A4D1C8B89B662842D10DE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_06C1B1FA8473488EB39A1260E073DC66 }}

      # 3. 아티팩트가 다운로드된 폴더 전체를 Azure Web App에 배포합니다.
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-serahp'
          slot-name: 'Production'
          package: ./deployment-package # 다운로드 받은 정확한 패키지 경로 지정
